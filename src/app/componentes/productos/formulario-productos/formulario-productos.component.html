<form (submit)="guardarCambios()" [formGroup]="form">

  <mat-form-field appearance="outline">
    <mat-label>Nombre</mat-label>
    <input matInput [formControl]="form.controls.nombre">
    <mat-error></mat-error>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Descripción</mat-label>
    <textarea matInput rows="3" [formControl]="form.controls.descripcion"></textarea>
  </mat-form-field>


  <mat-form-field>

    <mat-label>Precio</mat-label>
    <input matInput type="number" [formControl]="form.controls.precio">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Categoría</mat-label>
    <mat-select [formControl]="form.controls.categoriaId">
      @for (categoria of categoriasDTO; track categoria.id) {
      <mat-option [value]="categoria.id">
        {{ categoria.nombre }}
      </mat-option>
      }
    </mat-select>
    @if (form.controls.categoriaId.hasError('required')) {
    <mat-error>Debes seleccionar una categoría</mat-error>
    }
  </mat-form-field>

  <div>
    <app-input-img
    [urlImagenActual]="modelo?.imagenUrl"
     titulo="Foto Del producto" (archivoSeleccionado)="archivoSeleccionado($event)"></app-input-img>
  </div>




  <mat-form-field>

    <mat-label>Stock</mat-label>
    <input matInput type="number" [formControl]="form.controls.stock">
  </mat-form-field>


  <div class="contenedor-botones">
    <button type="submit" [disabled]="form.invalid">Guardar Cambios</button>
    <a mat-stroked-button routerLink="/productos">Cancelar</a>
  </div>


</form>
